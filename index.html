<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savit Innovations | Premium Hardware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SAVIT <span>INNOVATIONS</span></div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#live-cart">Cart</a></li>
        </ul>
        <div class="cart-icon-nav">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <h1>Savit Innovations</h1>
            <p>Premium Handles & Knobs for Modern Homes</p>
            <a href="#products" class="btn-hero">Shop Now</a>
        </div>
    </header>

    <section id="products" class="container">
        <h2 class="section-title">Our Products</h2>
        <div class="product-grid" id="product-display">
            </div>
    </section>

    <section id="live-cart" class="cart-section">
        <div class="container">
            <h2 class="section-title">Your Selection</h2>
            <div class="cart-card">
                <div id="cart-empty-msg">Your cart is empty. Select products above.</div>
                <div id="cart-items-container"></div>
                
                <div id="cart-summary" class="cart-summary" style="display: none;">
                    <div class="total-line">
                        <span>Total Amount:</span>
                        <span class="total-price">₹<span id="total-amount">0</span></span>
                    </div>
                    <button class="whatsapp-btn" onclick="sendOrderToWhatsApp()">
                        <i class="fab fa-whatsapp"></i> Order via WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Savit Innovations | MIT License | Contact: +91 9980056119</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
