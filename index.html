<!DOCTYPE html>
<html>
<head>
    <title>Savit Innovations | Hardware Store Karnataka</title>
   <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<body>

<header>
    <div class="logo">🔧 Savit Innovations</div>
    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>SAVIT INNOVATIONS</h1>
    <p>Delivery across Karnataka</p>
</section>

<!-- SEARCH + FILTER -->
<div class="controls">
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">

    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('handels')">Handels</button>
    <button onclick="filterCategory('knobs')">Knobs</button>
    <button onclick="filterCategory('concealed handels')">Concealed Handels</button>
</div>

<!-- PRODUCTS -->
<section id="products" class="products">

<div class="product" data-category="tools">
    <span class="badge">SALE</span>
    <img src="images/drill.jpg">
    <h2>Drill Machine</h2>
    <p>₹1500</p>

    <!-- Color Dropdown -->
    <select class="color">
        <option value="">Select Color</option>
        <option value="Red">Red</option>
        <option value="Black">Black</option>
        <option value="Blue">Blue</option>
    </select>

    <!-- Size Dropdown -->
    <select class="size">
        <option value="">Select Size</option>
        <option value="96mm">96mm</option>
        <option value="160mm">160mm</option>
        <option value="224mm">224mm</option>
        <option value="288">288mm</option>
    </select>
    <div class="quantity">
    <button onclick="changeQty(this, -1)">-</button>
    <span class="qty">1</span>
    <button onclick="changeQty(this, 1)">+</button>
</div>

    <!-- Add to Cart -->
    <button onclick="addToCartWithOptions(this, 'Drill Machine', 1500)">
        Add to Cart
    </button>

</div>
   
<div class="product" data-category="tools">
    <span class="badge">SALE</span>
    <img src="images/drill.jpg">
    <h2>Drill Machine</h2>
    <p>₹1500</p>

    <!-- Color Dropdown -->
    <select class="color">
        <option value="">Select Color</option>
        <option value="Red">Red</option>
        <option value="Black">Black</option>
        <option value="Blue">Blue</option>
    </select>

    <!-- Size Dropdown -->
    <select class="size">
        <option value="">Select Size</option>
        <option value="Small">Small</option>
        <option value="Medium">Medium</option>
        <option value="Large">Large</option>
        <option value="XL">XL</option>
    </select>
    <div class="quantity">
    <button onclick="changeQty(this, -1)">-</button>
    <span class="qty">1</span>
    <button onclick="changeQty(this, 1)">+</button>
</div>

    <!-- Add to Cart -->
    <button onclick="addToCartWithOptions(this, 'Drill Machine', 1500)">
        Add to Cart
    </button>

</div>
   

</section>

<!-- CART -->
<section class="cart">
    <h2>🛒 Cart</h2>
    <ul id="cart-items"></ul>
    <p id="total"></p>
    <button onclick="checkout()">Order on WhatsApp</button>
</section>

<!-- FOOTER -->
<footer id="contact">
    <p>📞 9980056119</p>
    <p>Delivery: Karnataka only</p>
    <p>© 2026 Savit Innovations</p>
</footer>

<script src="script.js"></script>

</body>
</html>
