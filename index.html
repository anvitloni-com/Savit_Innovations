<!DOCTYPE html>
<html>
<head>
    <title>Savit Innovations</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🔧 Savit Innovations</h1>
</header>

<section class="products">

    <!-- PRODUCT 1 -->
    <div class="product">
        <h2>Drill Machine</h2>
        <p>₹1500</p>

        <select id="color1">
            <option>Red</option>
            <option>Black</option>
        </select>

        <select id="size1">
            <option>96mm</option>
            <option>160mm</option>
        </select>

        <div>
            <button onclick="changeQty('qty1', -1)">-</button>
            <span id="qty1">1</span>
            <button onclick="changeQty('qty1', 1)">+</button>
        </div>

        <button onclick="addToCart(
            'Drill Machine',
            1500,
            'qty1',
            'color1',
            'size1'
        )">Add to Cart</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product">
        <h2>Steel Hammer</h2>
        <p>₹300</p>

        <select id="color2">
            <option>Silver</option>
            <option>Black</option>
        </select>

        <select id="size2">
            <option>Small</option>
            <option>Large</option>
        </select>

        <div>
            <button onclick="changeQty('qty2', -1)">-</button>
            <span id="qty2">1</span>
            <button onclick="changeQty('qty2', 1)">+</button>
        </div>

        <button onclick="addToCart(
            'Steel Hammer',
            300,
            'qty2',
            'color2',
            'size2'
        )">Add to Cart</button>
    </div>

</section>

<!-- CART -->
<section class="cart">
    <h2>🛒 Cart</h2>
    <ul id="cart-items"></ul>
    <p id="total">Total: ₹0</p>
    <button onclick="checkout()">Order on WhatsApp</button>
</section>

<script src="script.js"></script>

</body>
</html>
