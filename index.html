<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savit Innovations | Premium Hardware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Savit Innovations</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Premium Hardware for Modern Living</h1>
            <p>Exclusive collection of AH-Series Handles and Knobs.</p>
            <a href="#products" class="hero-btn">Shop Collection</a>
        </div>
    </section>

    <section class="trust-bar">
        <div class="feature"><i class="fas fa-shipping-fast"></i> <span>Fast Shipping</span></div>
        <div class="feature"><i class="fas fa-check-circle"></i> <span>Premium Quality</span></div>
        <div class="feature"><i class="fas fa-handshake"></i> <span>Wholesale Pricing</span></div>
        <div class="feature"><i class="fas fa-shield-alt"></i> <span>MIT Licensed</span></div>
    </section>

    <section class="controls">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search AH-001, AH-002..." onkeyup="filterProducts()">
        </div>
    </section>

    <main class="product-container" id="products">
        <div class="product-grid" id="product-grid"></div>
    </main>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="total-row"><span>Total:</span> ₹<span id="cart-total">0</span></div>
            <button class="checkout-btn" onclick="checkoutWhatsApp()">Confirm via WhatsApp</button>
        </div>
    </div>

    <a href="https://wa.me/919980056119" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span>Chat Now</span>
    </a>

    <script src="script.js"></script>
</body>
</html>
