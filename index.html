<!DOCTYPE html>
<html>
<head>
    <title>Savit Innovations | Hardware Store Karnataka</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">🔧 Savit Innovations</div>
    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>SAVIT INNOVATIONS</h1>
    <p>Delivery across Karnataka</p>
</section>

<!-- SEARCH + FILTER -->
<div class="controls">
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">

    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('handels')">Handels</button>
    <button onclick="filterCategory('knobs')">Knobs</button>
    <button onclick="filterCategory('concealed handels')">Concealed Handels</button>
</div>

<!-- PRODUCTS -->
<section id="products" class="products">

<div class="product" data-category="Handels">
    <img src="images/drill.jpg">
    <h2>Drill Machine</h2>
    <p>₹1500</p>
    <button onclick="addToCart('Drill Machine', 1500)">Add to Cart</button>
</div>

    <div class="product" data-category="Handels">
        <img src="images/hammer.jpg">
        <h2>Steel Hammer</h2>
        <p>₹300</p>
        <button onclick="addToCart('Steel Hammer', 300)">Add to Cart</button>
    </div>

</section>

<!-- CART -->
<section class="cart">
    <h2>🛒 Cart</h2>
    <ul id="cart-items"></ul>
    <p id="total"></p>
    <button onclick="checkout()">Order on WhatsApp</button>
</section>

<!-- FOOTER -->
<footer id="contact">
    <p>📞 9980056119</p>
    <p>Delivery: Karnataka only</p>
    <p>© 2026 Savit Innovations</p>
</footer>

<script src="script.js"></script>

</body>
</html>
