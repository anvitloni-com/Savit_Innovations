<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savit Innovations | Premium Hardware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Savit Innovations</div>
            <div class="nav-links">
                <a href="#">Home</a>
                <div class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <section class="controls">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for handles, knobs, or colors..." onkeyup="filterProducts()">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>

        <div class="filter-options">
            <button class="filter-btn active" onclick="setCategory('all', this)">All</button>
            <button class="filter-btn" onclick="setCategory('handels', this)">Handles</button>
            <button class="filter-btn" onclick="setCategory('knobs', this)">Knobs</button>
            <button class="filter-btn" onclick="setCategory('concealed', this)">Concealed Handles</button>
        </div>
    </section>

    <section id="products" class="product-container">
        <div class="product-grid" id="product-grid">
            </div>
    </section>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="total">Grand Total: ₹<span id="cart-total">0</span></div>
            <button class="checkout-btn" onclick="checkoutWhatsApp()">Confirm Order via WhatsApp</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Savit Innovations | MIT License</p>
        <p><i class="fab fa-whatsapp"></i> Support: +91 9980056119</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
