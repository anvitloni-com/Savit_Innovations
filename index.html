<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savit Innovations | Premium Hardware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Savit Innovations</div>
            <div class="contact">Contact:+91 9980056119</div>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#products">Products</a>
                <div class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Premium Handles & Knobs</h1>
            <p>Elevate your furniture with Savit Innovations.</p>
            <a href="#products" class="btn">Shop Now</a>
        </div>
    </section>

    <section id="products" class="product-container">
        <h2 class="section-title">Our Collection</h2>
        <div class="product-grid" id="product-grid">
            </div>
    </section>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="total">Total: ₹<span id="cart-total">0</span></div>
            <button class="checkout-btn" onclick="checkoutWhatsApp()">Checkout to WhatsApp</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Savit Innovations | MIT License</p>
        <p>Contact: +91 9980056119</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
