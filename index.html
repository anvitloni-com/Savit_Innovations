<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savit Innovations | Premium Hardware Solutions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SAVIT <span>INNOVATIONS</span></div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <h1>Elevate Your Interior</h1>
            <p>Premium Handles, Knobs, and Concealed Hardware.</p>
            <a href="#products" class="btn">View Catalog</a>
        </div>
    </header>

    <section id="products" class="container">
        <h2 class="section-title">Our Collection</h2>
        <div class="product-grid" id="product-display">
            </div>
    </section>

  <section id="contact" class="container">
    <h2 class="section-title">Get in Touch</h2>
    <div style="text-align: center; margin-bottom: 2rem;">
        <p><i class="fas fa-phone"></i> Call us: <strong>+91 9980056119</strong></p>
        <p><i class="fab fa-whatsapp"></i> WhatsApp: <strong>+91 9980056119</strong></p>
    </div>
    
    <form id="contact-form">
        <input type="text" id="cust-name" placeholder="Your Name" required>
        <textarea id="cust-msg" placeholder="General Inquiry..." rows="5"></textarea>
        <button type="submit" class="btn">Send via WhatsApp</button>
    </form>
</section>
    <footer>
        <p>&copy; 2026 Savit Innovations. Released under the MIT License.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
